<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4분할 운동 추천 프로그램</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header-image-container">
        <header>
            <h1>4분할 운동 프로그램</h1>
            <p>오늘의 운동을 선택하고, 당신의 한계에 도전하세요.</p>
        </header>
    </div>

    <main>
        <div class="button-group">
            <button class="day-btn" id="upper1">상체 1<br><small>(가슴/등)</small></button>
            <button class="day-btn" id="lower1">하체 1<br><small>(하체 집중)</small></button>
            <button class="day-btn" id="upper2">상체 2<br><small>(어깨/팔)</small></button>
            <button class="day-btn" id="lower2">하체 2<br><small>(후면/코어)</small></button>
        </div>
        <div id="workout-description"></div>
        <div class="controls">
            <button id="change-workout">다른 운동 보기</button>
        </div>
        <div id="workout-display"></div>
    </main>
    <script src="main.js"></script>
</body>
</html>
