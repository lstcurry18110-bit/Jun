
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4분할 운동 추천 프로그램</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
</head>
<body>
    <header>
        <h1>4분할 운동 추천 프로그램</h1>
        <p>아래에서 운동할 날을 선택하세요. 루틴을 변경하고 진행 상황을 체크할 수 있습니다.</p>
    </header>
    <main>
        <div class="button-group">
            <button class="day-btn" id="upper1">상체 1</button>
            <button class="day-btn" id="lower1">하체 1</button>
            <button class="day-btn" id="upper2">상체 2</button>
            <button class="day-btn" id="lower2">하체 2</button>
        </div>
        <div class="controls">
            <button id="change-workout">운동 변경</button>
        </div>
        <div id="workout-display"></div>
    </main>
    <script src="main.js"></script>
</body>
</html>
